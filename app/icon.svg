<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <rect width="32" height="32" rx="6" fill="#1a1614"/>
  <!-- 4x4 fret grid -->
  <!-- Horizontal fret lines -->
  <line x1="6" y1="8" x2="26" y2="8" stroke="#3a352f" stroke-width="1.5"/>
  <line x1="6" y1="14" x2="26" y2="14" stroke="#3a352f" stroke-width="1.5"/>
  <line x1="6" y1="20" x2="26" y2="20" stroke="#3a352f" stroke-width="1.5"/>
  <line x1="6" y1="26" x2="26" y2="26" stroke="#3a352f" stroke-width="1.5"/>
  <!-- Vertical string lines -->
  <line x1="6" y1="8" x2="6" y2="26" stroke="#3a352f" stroke-width="1.5"/>
  <line x1="13" y1="8" x2="13" y2="26" stroke="#3a352f" stroke-width="1.5"/>
  <line x1="20" y1="8" x2="20" y2="26" stroke="#3a352f" stroke-width="1.5"/>
  <line x1="26" y1="8" x2="26" y2="26" stroke="#3a352f" stroke-width="1.5"/>
  <!-- Chord dots in amber -->
  <circle cx="6" cy="14" r="3" fill="#e8b86b"/>
  <circle cx="13" cy="20" r="3" fill="#e8b86b"/>
  <circle cx="20" cy="14" r="3" fill="#e8b86b"/>
</svg>
