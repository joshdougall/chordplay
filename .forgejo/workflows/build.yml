name: Build and push Docker image

on:
  push:
    tags:
      - "v*"
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: forgejo.dougall.ca
  IMAGE_NAME: joshdougall/chordplay

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Forgejo registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ gitea.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -eu
          SHORT_SHA="${GITHUB_SHA::7}"
          REF_TYPE="${GITHUB_REF_TYPE:-branch}"
          REF_NAME="${GITHUB_REF_NAME:-main}"
          TAGS="${REGISTRY}/${IMAGE_NAME}:${SHORT_SHA}"
          if [ "$REF_TYPE" = "tag" ]; then
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:${REF_NAME}"
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:latest"
          elif [ "$REF_NAME" = "main" ]; then
            TAGS="${TAGS},${REGISTRY}/${IMAGE_NAME}:main"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "Building: ${TAGS}"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
